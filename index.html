<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Aniversário! ✨</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --rosa-fundo: #FFF5F7;
            --rosa-claro: #FADADD;
            --rosa-accent: #EEA9B8;
            --texto-principal: #6B4E54;
            --fonte-titulo: 'Cormorant Garamond', serif;
            --fonte-texto: 'Poppins', sans-serif;
            --fonte-escrita: 'Great Vibes', cursive;
        }

        body, html {
            margin: 0; padding: 0; width: 100%;
            font-family: var(--fonte-texto); color: var(--texto-principal);
            background-color: var(--rosa-fundo); scroll-behavior: smooth;
            overflow-x: hidden; position: relative;
        }

        /* BANDEIRINHAS */
        .faixa-bandeirinhas {
            position: absolute; top: 10px; left: 0;
            width: 100%; height: 60px;
            background-image: url('bandeirinhas_rosa.png');
            background-repeat: repeat-x; background-size: contain;
            z-index: 50; opacity: 0.9;
        }

        /* ABELHA VOADORA */
        .abelha { 
            position: fixed; width: 35px; z-index: 1000; 
            pointer-events: none; transition: transform 0.5s ease;
        }

        .music-control {
            position: fixed; top: 20px; right: 20px;
            width: 45px; height: 45px; background: rgba(255,255,255,0.8);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 1001; border: 1.5px solid var(--rosa-claro);
        }

        section { width: 100vw; min-height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; padding: 40px 0; }

        /* SEÇÃO 1 */
        .container-colagem-1 { position: relative; width: 90%; max-width: 500px; height: 400px; }
        .img-envelope { width: 100%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1; }
        .texto-envelope { position: absolute; top: 46%; left: 50%; transform: translate(-50%, -50%); font-family: var(--fonte-escrita); font-size: 1.8rem; z-index: 2; text-align: center; width: 80%; }
        .img-camera { width: 100px; position: absolute; bottom: 20px; left: 10px; transform: rotate(-8deg); z-index: 3; }
        .img-buque { width: 90px; position: absolute; top: 20px; right: 10px; transform: rotate(15deg); z-index: 3; }

        /* SEÇÃO 2: CADERNO */
        #caderno { background-image: url('fundo_papel_rosa.jpg'); background-size: cover; }
        .caderno-wrapper {
            width: 95%; max-width: 900px; min-height: 70vh;
            background-image: url('fundo_caderno_clean.png');
            background-size: 100% 100%; background-repeat: no-repeat;
            position: relative; display: flex; flex-wrap: wrap; padding: 40px; border-radius: 15px;
        }

        .caderno-esquerda, .caderno-direita { flex: 1; min-width: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 20px; }

        .img-bebe { width: 150px; border-radius: 50%; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* VELINHA */
        .candle-container { position: relative; width: 45px; margin-top: 10px; cursor: pointer; }
        .img-vela { width: 100%; height: auto; position: relative; z-index: 2; }
        .flame {
            width: 12px; height: 22px; background: radial-gradient(#FFF8E1, #FFD700, #FF4500);
            border-radius: 50% 50% 20% 20%; position: absolute; top: -18px; left: 50%;
            transform: translateX(-50%); z-index: 3; animation: flicker 0.8s infinite alternate;
        }
        @keyframes flicker { 0% { opacity: 0.8; transform: translateX(-50%) scale(1); } 100% { opacity: 1; transform: translateX(-50%) scale(1.1); } }
        .flame.apagada { display: none; }
        .mensagem-vela { position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%); font-family: var(--fonte-escrita); font-size: 1.1rem; color: var(--rosa-accent); opacity: 0; white-space: nowrap; transition: 0.5s; }
        .mensagem-vela.visivel { opacity: 1; }

        /* DIREITA */
        .img-baloes { width: 80px; position: absolute; top: 10px; right: 10px; z-index: 5; }
        .polaroid-wrapper { background: white; padding: 10px 10px 40px 10px; transform: rotate(2deg); box-shadow: 0 8px 15px rgba(0,0,0,0.1); position: relative; }
        .img-polaroid { width: 180px; aspect-ratio: 1/1; object-fit: cover; }
        .texto-polaroid { position: absolute; bottom: 8px; right: 10px; font-family: var(--fonte-escrita); font-size: 1.5rem; color: #E87A90; }

        /* CARTA */
        .nota-carta { background: white; width: 85%; max-width: 500px; padding: 40px; position: relative; border-radius: 5px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .img-laco { width: 45px; position: absolute; top: -20px; left: 50%; transform: translateX(-50%); }
        .nota-carta p { font-family: var(--fonte-escrita); font-size: 1.5rem; line-height: 1.4; margin: 10px 0; }
        .img-lirio { width: 80px; position: absolute; bottom: -30px; left: -30px; }
        .img-urso { width: 70px; position: absolute; bottom: -20px; right: -20px; }

        @media (max-width: 600px) {
            .caderno-wrapper { background-image: none; background-color: white; border: 2px solid var(--rosa-claro); }
            .texto-envelope { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="faixa-bandeirinhas"></div>
    <img src="abelha_fofa.png" class="abelha" id="abelha">
    
    <div class="music-control" id="btn-musica">🔇</div>
    <audio id="musica-tema" loop><source src="musica.mp3" type="audio/mpeg"></audio>

    <section id="abertura">
        <div class="container-colagem-1">
            <img src="envelope_rosa.png" class="img-envelope">
            <div class="texto-envelope">Para alguém especial,<br>[NOME DELA]</div>
            <img src="camera_aesthetic.png" class="img-camera">
            <img src="buque_rosa.png" class="img-buque">
        </div>
    </section>

    <section id="caderno">
        <div class="caderno-wrapper">
            <img src="baloes_coracao.png" class="img-baloes">
            
            <div class="caderno-esquerda">
                <img src="foto_bebe.jpg" class="img-bebe">
                <div class="candle-container" id="vela-box">
                    <div class="flame" id="fogo"></div>
                    <img src="vela_17.png" class="img-vela">
                    <div class="mensagem-vela" id="msg-vela">Faça um pedido! ✨</div>
                </div>
                <p style="text-align: center; margin-top: 30px; font-size: 0.9rem;">Mesmo em pouco tempo, você já é favorita...</p>
            </div>

            <div class="caderno-direita">
                <img src="livrinho_atras_clean.png" style="width: 150px; position: absolute; top: 20px; left: 20px; opacity: 0.5;">
                <div class="polaroid-wrapper">
                    <img src="foto_polaroid.jpg" class="img-polaroid">
                    <div class="texto-polaroid">tão linda...</div>
                </div>
            </div>
        </div>
    </section>

    <section id="carta">
        <div class="nota-carta">
            <img src="laco_rosa.png" class="img-laco">
            <p>Feliz aniversário! ✨</p>
            <p>Dizem que as melhores surpresas chegam sem aviso, e conhecer você foi exatamente assim. Que esse seja o primeiro de muitos.</p>
            <img src="lirio_rosa.png" class="img-lirio">
            <img src="urso_fofo_clean.png" class="img-urso">
        </div>
    </section>

    <script>
        // ABELHA VOANDO SOZINHA
        const abelha = document.getElementById('abelha');
        let posX = Math.random() * window.innerWidth;
        let posY = Math.random() * window.innerHeight;
        let targetX = posX, targetY = posY;

        function moveAbelha() {
            targetX = Math.random() * (window.innerWidth - 50);
            targetY = Math.random() * (window.innerHeight - 50);
            // Inverter a abelha dependendo da direção
            abelha.style.transform = targetX > posX ? "scaleX(1)" : "scaleX(-1)";
        }

        function update() {
            posX += (targetX - posX) * 0.01;
            posY += (targetY - posY) * 0.01;
            abelha.style.left = posX + "px";
            abelha.style.top = posY + "px";
            if (Math.abs(posX - targetX) < 10) moveAbelha();
            requestAnimationFrame(update);
        }
        moveAbelha(); update();

        // MÚSICA
        const btn = document.getElementById('btn-musica');
        const audio = document.getElementById('musica-tema');
        btn.onclick = () => {
            if (audio.paused) { audio.play(); btn.innerHTML = '🔊'; }
            else { audio.pause(); btn.innerHTML = '🔇'; }
        };

        // VELA
        const velaBox = document.getElementById('vela-box');
        velaBox.onclick = () => {
            document.getElementById('fogo').classList.add('apagada');
            document.getElementById('msg-vela').classList.add('visivel');
        };
    </script>
</body>
</html>
