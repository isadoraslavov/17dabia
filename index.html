<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pra bia</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --rosa-fundo: #FFF5F7;
            --texto-cor: #5a4548;
            --fonte-escrita: 'Great Vibes', cursive;
        }

        body, html { margin: 0; padding: 0; background-color: var(--rosa-fundo); overflow-x: hidden; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }

        .faixa-bandeirinhas {
            position: absolute; top: 0; left: 0; width: 100%; height: 50px;
            background-image: url('bandeirinhas_rosa.png');
            background-repeat: repeat-x; background-size: contain; z-index: 100;
        }

        .music-control {
            position: fixed; top: 60px; right: 20px; width: 40px; height: 40px;
            background: white; border-radius: 50%; display: flex; justify-content: center;
            align-items: center; cursor: pointer; z-index: 1001; border: 1px solid #fadadd;
        }

        section { width: 100vw; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 40px 0; }

        .area-envelope-master { display: flex; align-items: center; justify-content: center; position: relative; width: 100%; max-width: 400px; margin-top: 50px; }
        .wrapper-conteudo-envelope { position: relative; width: 280px; }
        .img-envelope { width: 100%; height: auto; display: block; z-index: 10; position: relative; }
        
        .texto-envelope { 
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); 
            width: 80%; text-align: center; font-family: var(--fonte-escrita); 
            font-size: 1.8rem; z-index: 15; color: var(--texto-cor); line-height: 1;
        }
        
        .img-buque { width: 140px; position: absolute; right: -60px; top: -20px; z-index: 20; transform: rotate(15deg); }
        .img-camera { width: 100px; position: absolute; left: -40px; bottom: -10px; z-index: 20; transform: rotate(-10deg); }

        /* SEÇÃO CADERNO */
        .caderno-bg { background-image: url('fundo_papel_rosa.jpg'); background-size: cover; width: 100%; padding: 50px 0; }
        .caderno-container { width: 90%; max-width: 380px; background-image: url('fundo_caderno_clean.png'); background-size: 100% 100%; padding: 40px 10px; display: flex; flex-direction: column; align-items: center; margin: 0 auto; }
        .img-bebe { width: 130px; height: 130px; border-radius: 50%; border: 4px solid white; object-fit: cover; }
        
        .vela-area { position: relative; width: 40px; margin: 10px 0; cursor: pointer; }
        .flame {
            width: 12px; height: 20px; background: radial-gradient(#FFF8E1, #FFD700, #FF4500);
            border-radius: 50% 50% 20% 20%; position: absolute; top: -15px; left: 50%; 
            transform: translateX(-50%); animation: flicker 0.8s infinite alternate; z-index: 20;
        }
        .flame.apagada { display: none; }

        .polaroid-box { background: white; padding: 10px 10px 40px 10px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); transform: rotate(2deg); margin-top: 20px; position: relative; }
        .img-polaroid { width: 170px; height: 170px; object-fit: cover; }
        .texto-polaroid { position: absolute; bottom: 8px; right: 10px; font-family: var(--fonte-escrita); font-size: 1.8rem; color: #E87A90; }

        /* SEÇÃO CARTA */
        .papel-carta { 
            background: white; width: 85%; max-width: 380px; padding: 50px 25px 110px 25px; 
            border-radius: 2px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            background-image: linear-gradient(#f0f0f0 1px, transparent 1px); background-size: 100% 30px; 
        }
        .laco-topo { width: 50px; position: absolute; top: -25px; left: 50%; transform: translateX(-50%); z-index: 20; }
        
        /* Forçando a fonte bonita em todos os parágrafos da carta */
        .papel-carta p { font-family: var(--fonte-escrita); font-size: 1.6rem; color: var(--texto-cor); line-height: 1.5; margin: 15px 0; text-align: center; }
        
        .img-lirio-final { width: 90px; position: absolute; bottom: 10px; left: -10px; z-index: 25; }
        .img-urso-final { width: 140px; position: absolute; bottom: -10px; right: -20px; z-index: 25; }

        .abelha { position: fixed; width: 35px; z-index: 1000; pointer-events: none; mix-blend-mode: multiply; }
        @keyframes flicker { 0% { opacity: 0.8; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="faixa-bandeirinhas"></div>
    <img src="abelha_fofa.png" class="abelha" id="abelha">
    
    <div class="music-control" id="btn-musica">🔇</div>
    <audio id="musica-tema" loop><source src="musica.mp3" type="audio/mpeg"></audio>

    <section>
        <div class="area-envelope-master">
            <div class="wrapper-conteudo-envelope">
                <img src="camera_aesthetic.png" class="img-camera">
                <img src="buque_rosa.png" class="img-buque">
                <img src="envelope_rosa.png" class="img-envelope">
                <div class="texto-envelope">
                    feliz aniversário,<br> meu bem 
                </div>
            </div>
        </div>
    </section>

    <section class="caderno-bg">
        <div class="caderno-container">
            <img src="foto_bebe.jpg" class="img-bebe">
            <div class="vela-area" onclick="apagar()">
                <div class="flame" id="fogo"></div>
                <img src="vela_17.png" style="width: 100%;">
            </div>
            <p style="text-align: center; font-family: 'Poppins'; font-size: 0.8rem; color: #888;">bia neneca</p>
            <div class="polaroid-box">
                <img src="foto_polaroid.jpg" class="img-polaroid">
                <div class="texto-polaroid">🩷</div>
            </div>
        </div>
    </section>

    <section style="background-color: #FEF0F3; padding-bottom: 80px;">
        <div class="papel-carta">
            <img src="laco_rosa.png" class="laco-topo">
            
            <p>feliz aniversário princesa</p>
            
            <p><que esse novo ano te leve pra perto das coisas que fazem sentido pra você e te afaste das que não fazem>
        
            <p></p>que você tenha boas pessoas por perto e momentos que te fazem feliz            
            <img src="lirio_rosa.png" class="img-lirio-final">
            <img src="urso_fofo_clean.png" class="img-urso-final">
        </div>
    </section>

    <script>
        const abelha = document.getElementById('abelha');
        let px = 50, py = 50, tx = 50, ty = 50;
        function mover() {
            tx = Math.random() * (window.innerWidth - 40);
            ty = Math.random() * (window.innerHeight - 40);
            if(abelha) abelha.style.transform = tx > px ? "scaleX(1)" : "scaleX(-1)";
        }
        function animar() {
            px += (tx - px) * 0.02; py += (ty - py) * 0.02;
            if(abelha) { abelha.style.left = px + 'px'; abelha.style.top = py + 'px'; }
            if (Math.abs(px - tx) < 10) mover();
            requestAnimationFrame(animar);
        }
        mover(); animar();

        const btn = document.getElementById('btn-musica');
        const audio = document.getElementById('musica-tema');
        if(btn && audio) {
            btn.onclick = () => {
                if (audio.paused) { audio.play(); btn.innerHTML = '🔊'; }
                else { audio.pause(); btn.innerHTML = '🔇'; }
            };
        }
        function apagar() { 
            const f = document.getElementById('fogo');
            if(f) f.classList.add('apagada'); 
        }
    </script>
</body>
</html>
